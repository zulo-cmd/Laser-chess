<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laser Chess Online - Board Fix</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        #setup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .setup-btn { margin: 15px; padding: 25px 50px; font-size: 22px; cursor: pointer; border-radius: 12px; border: none; font-weight: bold; transition: 0.3s; color: white; text-transform: uppercase; }
        .setup-btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        
        #game-container { position: relative; border: 5px solid #444; box-shadow: 0 0 30px rgba(0,0,0,0.5); margin-top: 10px; }
        #board { display: grid; grid-template-columns: repeat(10, 60px); grid-template-rows: repeat(8, 60px); background-color: #222; }
        .cell { width: 60px; height: 60px; border: 1px solid #333; box-sizing: border-box; position: relative; cursor: pointer; }
        .hatched-red { background: repeating-linear-gradient(45deg, #222, #222 5px, #551111 5px, #551111 10px); }
        .hatched-cyan { background: repeating-linear-gradient(45deg, #222, #222 5px, #114444 5px, #114444 10px); }
        .selected { background-color: rgba(255, 255, 0, 0.2) !important; box-shadow: inset 0 0 15px yellow; }
        .piece { transition: all 0.4s ease-in-out; width: 100%; height: 100%; }
        
        #laser-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 10; }
        #controls { margin-top: 20px; display: flex; gap: 15px; background: #333; padding: 15px; border-radius: 12px; border: 1px solid #555; }
        button { padding: 12px 24px; font-weight: bold; cursor: pointer; border-radius: 6px; border: none; background: #555; color: white; text-transform: uppercase; }
        #btn-confirm { background-color: #2e7d32; box-shadow: 0 4px #1b5e20; }
        #btn-undo { background-color: #c62828; box-shadow: 0 4px #8e0000; }
        button:disabled { opacity: 0.2; cursor: not-allowed; }
        
        .status-bar { width: 600px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 18px; font-weight: bold; }
        .online-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; background: #444; margin-right: 5px; }
        .online { background: #00ff00 !important; box-shadow: 0 0 10px #00ff00; }
        
        @keyframes explode { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(0); opacity: 0; } }
        .destroying { animation: explode 0.6s forwards; }
    </style>
</head>
<body>

<div id="setup-overlay">
    <h1 style="font-size: 40px; margin-bottom: 30px;">LASER CHESS ONLINE</h1>
    <div id="lobby-status" style="margin-bottom: 20px; color: #ffaa00;">Initializing...</div>
    <div>
        <button class="setup-btn" style="background:#00aaaa;" onclick="selectPlayer(1)">Join as Player 1</button>
        <button class="setup-btn" style="background:#cc4444;" onclick="selectPlayer(2)">Join as Player 2</button>
    </div>
    <button style="margin-top: 40px; background: none; border: 1px solid #555; color: #777;" onclick="resetEntireGame()">Reset Entire Game</button>
</div>

<div class="status-bar">
    <div><span id="dot-2" class="online-dot"></span><span style="color: #cc4444;">RED</span></div>
    <span id="status-text" style="color: #ccc; letter-spacing: 2px;">WAITING...</span>
    <div><span style="color: #00aaaa;">CYAN</span><span id="dot-1" class="online-dot"></span></div>
</div>

<div id="game-container">
    <div id="board"></div>
    <canvas id="laser-canvas" width="600" height="480"></canvas>
</div>

<div id="controls">
    <button id="btn-rot-left">↶ Rotate</button>
    <button id="btn-rot-right">↷ Rotate</button>
    <button id="btn-undo" disabled>Undo</button>
    <button id="btn-confirm" disabled>Confirm Move</button>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDhTAxVQBzT1NW99opq7c6eh4OHhIRxVv0",
    authDomain: "laserchess-online.firebaseapp.com",
    projectId: "laserchess-online",
    storageBucket: "laserchess-online.firebasestorage.app",
    messagingSenderId: "416512043795",
    appId: "1:416512043795:web:5402777263e2c89fbb08e6",
    databaseURL: "https://laserchess-online-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref('game_state');

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    if (type === 'click') { osc.frequency.setValueAtTime(800, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); osc.start(); osc.stop(audioCtx.currentTime + 0.1); }
    else if (type === 'laser') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(500, audioCtx.currentTime); gain.gain.setValueAtTime(0.05, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.8); }
    else if (type === 'hit') { osc.type = 'square'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.4); }
}

const ROWS = 8, COLS = 10;
let myPlayerId = null; 
let currentPlayer = 1;
let board = Array(ROWS).fill(null).map(() => Array(COLS).fill(null));
let originalBoard = null;
let selectedPos = null;
let hasDoneAction = false;
let gameActive = false;
let lastActionId = null; 

db.child('players').on('value', (snap) => {
    const p = snap.val() || {};
    document.getElementById('lobby-status').innerText = 
        `Players Online: ${p[1] ? 'P1 ' : ''}${p[2] ? 'P2' : ''}${(!p[1] && !p[2]) ? 'None' : ''}`;
});

// TURVALLINEN LAUDAN PARSIJA: Estää Firebasen tyhjien rivien poiston aiheuttamat kaatumiset
function parseBoard(firebaseData) {
    let safeBoard = Array(ROWS).fill(null).map(() => Array(COLS).fill(null));
    if (!firebaseData) return safeBoard;
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (firebaseData[r] && firebaseData[r][c]) {
                safeBoard[r][c] = firebaseData[r][c];
            }
        }
    }
    return safeBoard;
}

function selectPlayer(id) {
    myPlayerId = id;
    document.getElementById('setup-overlay').style.display = 'none';
    db.child('players/' + myPlayerId).set(true);
    db.child('players/' + myPlayerId).onDisconnect().remove();

    db.on('value', (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        const p1Online = data.players && data.players[1];
        const p2Online = data.players && data.players[2];
        document.getElementById('dot-1').className = 'online-dot' + (p1Online ? ' online' : '');
        document.getElementById('dot-2').className = 'online-dot' + (p2Online ? ' online' : '');
        gameActive = !!(p1Online && p2Online);

        if (!data.board) {
            if (myPlayerId === 1) initNewGame();
            return;
        }

        if (data.lastAction && data.lastAction.id !== lastActionId) {
            lastActionId = data.lastAction.id;
            
            board = parseBoard(data.board); // Käytetään turvallista parsijaa
            render();
            
            if (data.lastAction.shooter !== myPlayerId) {
                setTimeout(() => {
                    fireLaser(data.lastAction.shooter, false);
                }, 300); 
            }
        } else {
            board = parseBoard(data.board); // Käytetään turvallista parsijaa
            currentPlayer = data.currentPlayer || 1;
            render();
            updateStatusText();
        }
    });
}

function updateStatusText() {
    const status = document.getElementById('status-text');
    if (!gameActive) {
        status.innerText = "WAITING FOR OPPONENT...";
        status.style.color = "#ffaa00";
        return;
    }
    if (currentPlayer === myPlayerId) {
        status.innerText = "YOUR TURN";
        status.style.color = (myPlayerId === 1) ? "#00aaaa" : "#cc4444";
    } else {
        status.innerText = "OPPONENT'S TURN";
        status.style.color = "#777";
    }
}

function pos(x, y) { return { r: 8 - y, c: x - 1 }; }

function initNewGame() {
    let newBoard = Array(ROWS).fill(null).map(() => Array(COLS).fill(null));
    const setup = [
        {...pos(1,8), p:2, t:'cannon', rot:2}, {...pos(5,8), p:2, t:'shield', rot:2},
        {...pos(6,8), p:2, t:'king',   rot:2}, {...pos(7,8), p:2, t:'shield', rot:2},
        {...pos(8,8), p:2, t:'single', rot:3}, {...pos(3,7), p:2, t:'single', rot:0},
        {...pos(1,5), p:2, t:'single', rot:2}, {...pos(5,5), p:2, t:'double', rot:0},
        {...pos(6,5), p:2, t:'double', rot:1}, {...pos(8,5), p:2, t:'single', rot:3},
        {...pos(1,4), p:2, t:'single', rot:3}, {...pos(8,4), p:2, t:'single', rot:2},
        {...pos(7,3), p:2, t:'single', rot:3},
        {...pos(10,1), p:1, t:'cannon', rot:0}, {...pos(4,1), p:1, t:'shield', rot:0},
        {...pos(5,1), p:1, t:'king',   rot:0}, {...pos(6,1), p:1, t:'shield', rot:0},
        {...pos(3,1), p:1, t:'single', rot:1}, {...pos(8,2), p:1, t:'single', rot:2},
        {...pos(10,4), p:1, t:'single', rot:0}, {...pos(3,4), p:1, t:'single', rot:1},
        {...pos(5,4), p:1, t:'double', rot:1}, {...pos(6,4), p:1, t:'double', rot:0},
        {...pos(10,5), p:1, t:'single', rot:1}, {...pos(3,5), p:1, t:'single', rot:0},
        {...pos(4,6), p:1, t:'single', rot:1}
    ];
    setup.forEach(s => newBoard[s.r][s.c] = { player: s.p, type: s.t, rot: s.rot });
    board = newBoard;
    
    // KORJATTU: update() ei tuhoa players-tietoja, kuten set() teki
    db.update({ board: board, currentPlayer: 1 }); 
}

function resetEntireGame() {
    if(confirm("DANGER: This wipes the game for everyone. Continue?")) {
        db.remove().then(() => location.reload());
    }
}

// --- LOGIC ---
function handleClick(r, c) {
    if (!gameActive || currentPlayer !== myPlayerId || hasDoneAction) return;
    const piece = board[r][c];
    if (selectedPos) {
        if (Math.abs(selectedPos.r - r) <= 1 && Math.abs(selectedPos.c - c) <= 1 && !piece) {
            const p = board[selectedPos.r][selectedPos.c];
            if (p.type === 'cannon') return;
            if ((c===0 || (r===0 && c===8) || (r===7 && c===8)) && p.player !== 2) return;
            if ((c===9 || (r===0 && c===1) || (r===7 && c===1)) && p.player !== 1) return;
            
            playSound('click');
            originalBoard = JSON.parse(JSON.stringify(board));
            board[r][c] = {...p}; board[selectedPos.r][selectedPos.c] = null;
            finishAction(); return;
        }
    }
    if (piece && piece.player === myPlayerId) { playSound('click'); selectedPos = {r, c}; render(); }
}

function rotate(dir) {
    if (!gameActive || currentPlayer !== myPlayerId || !selectedPos || hasDoneAction) return;
    const p = board[selectedPos.r][selectedPos.c];
    if (p.type === 'king') return;
    if (p.type === 'cannon') {
        let nr = (p.rot + dir + 4) % 4;
        if ((p.player === 1 && nr === 1) || (p.player === 2 && nr === 3)) return;
    }
    playSound('click');
    originalBoard = JSON.parse(JSON.stringify(board));
    p.rot = (p.rot + dir + 4) % 4;
    finishAction();
}

function finishAction() {
    hasDoneAction = true; selectedPos = null;
    document.getElementById('btn-confirm').disabled = false;
    document.getElementById('btn-undo').disabled = false;
    render();
}

document.getElementById('btn-undo').onclick = () => {
    board = JSON.parse(JSON.stringify(originalBoard));
    hasDoneAction = false;
    document.getElementById('btn-confirm').disabled = true;
    document.getElementById('btn-undo').disabled = true;
    render();
};

document.getElementById('btn-confirm').onclick = () => {
    document.getElementById('btn-confirm').disabled = true;
    document.getElementById('btn-undo').disabled = true;
    
    const actionId = Date.now().toString();
    lastActionId = actionId;
    
    db.update({ 
        board: board, 
        lastAction: { id: actionId, shooter: myPlayerId } 
    }).then(() => {
        fireLaser(myPlayerId, true);
    });
};

function fireLaser(shooterId, isMyLocalTurn) {
    playSound('laser');
    let tykki = null;
    for(let r=0; r<8; r++) {
        for(let c=0; c<10; c++) {
            if(board[r][c]?.type==='cannon' && board[r][c].player===shooterId) tykki={r,c,rot:board[r][c].rot};
        }
    }
    if (!tykki) return;

    let x=tykki.c, y=tykki.r, dir=tykki.rot;
    const canvas = document.getElementById('laser-canvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,600,480);
    ctx.shadowBlur = 10; ctx.shadowColor = shooterId===1 ? '#00aaaa' : '#cc4444';
    ctx.strokeStyle = '#eee'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(x*60+30, y*60+30);

    let hit = null;
    for(let i=0; i<60; i++) {
        if (dir===0) y--; else if (dir===1) x++; else if (dir===2) y++; else if (dir===3) x--;
        ctx.lineTo(x*60+30, y*60+30);
        if (x<0 || x>=10 || y<0 || y>=8) break;
        let p = board[y][x];
        if (p) {
            let res = resolve(p, d=dir);
            if (res==='stop') break;
            if (res==='destroy') { hit={r:y,c:x}; break; }
            if (res==='win') { 
                ctx.stroke();
                setTimeout(() => { alert("GAME OVER!"); resetEntireGame(); }, 500);
                return; 
            }
            dir = res;
        }
    }
    ctx.stroke();

    setTimeout(() => {
        if(hit) {
            playSound('hit');
            document.getElementById(`piece-${hit.r}-${hit.c}`)?.classList.add('destroying');
            setTimeout(() => { 
                if (isMyLocalTurn) {
                    board[hit.r][hit.c] = null; 
                    endTurn(); 
                }
                ctx.clearRect(0,0,600,480);
            }, 600);
        } else {
            if (isMyLocalTurn) endTurn();
            ctx.clearRect(0,0,600,480);
        }
    }, 800);
}

function resolve(p, d) {
    if (p.type==='king') return 'win';
    if (p.type==='cannon') return 'stop';
    if (p.type==='shield') return (d===(p.rot+2)%4) ? 'stop' : 'destroy';
    if (p.type==='double') {
        if (p.rot%2===0) { if(d===0)return 3; if(d===2)return 1; if(d===1)return 2; if(d===3)return 0; }
        else { if(d===0)return 1; if(d===2)return 3; if(d===1)return 0; if(d===3)return 2; }
    }
    if (p.type==='single') {
        const r = p.rot;
        if(r===0 && d===0) return 3; if(r===0 && d===1) return 2;
        if(r===1 && d===1) return 0; if(r===1 && d===2) return 3;
        if(r===2 && d===2) return 1; if(r===2 && d===3) return 0;
        if(r===3 && d===3) return 2; if(r===3 && d===0) return 1;
        return 'destroy';
    }
}

function endTurn() {
    currentPlayer = (myPlayerId === 1) ? 2 : 1;
    hasDoneAction = false;
    db.update({ board: board, currentPlayer: currentPlayer, lastAction: null });
}

function getSVG(p) {
    const color = p.player === 1 ? '#00aaaa' : '#cc4444';
    const glow = p.player === 1 ? '0 0 5px #00aaaa' : '0 0 5px #cc4444';
    let content = '';
    if (p.type==='cannon') { content = `<circle cx="30" cy="30" r="22" fill="${color}" stroke="#000"/><rect x="25" y="5" width="10" height="25" fill="#ddd" rx="2"/>`; }
    else if (p.type==='king') { content = `<rect x="15" y="15" width="30" height="30" fill="${color}" stroke="#000" rx="3"/><path d="M22,22 L38,38 M38,22 L22,38" stroke="#fff" stroke-width="4" stroke-linecap="round"/>`; }
    else if (p.type==='shield') { content = `<rect x="10" y="10" width="40" height="40" fill="${color}" stroke="#000" rx="2"/><rect x="10" y="10" width="40" height="10" fill="#ddd" rx="1"/>`; }
    else if (p.type==='single') { content = `<polygon points="10,10 50,10 50,50" fill="${color}" stroke="#000"/><line x1="10" y1="10" x2="50" y2="50" stroke="#eee" stroke-width="4"/>`; }
    else if (p.type==='double') { content = `<rect x="26" y="5" width="8" height="50" transform="rotate(-45 30 30)" fill="${color}" fill-opacity="0.8" stroke="#eee" stroke-width="1"/>`; }
    return `<svg viewBox="0 0 60 60" style="transform: rotate(${p.rot * 90}deg); filter: drop-shadow(${glow});">${content}</svg>`;
}

function render() {
    const boardEl = document.getElementById('board');
    boardEl.innerHTML = '';
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            if (c === 0 || (r===0 && c===8) || (r===7 && c===8)) cell.classList.add('hatched-red');
            if (c === 9 || (r===0 && c===1) || (r===7 && c===1)) cell.classList.add('hatched-cyan');
            if (selectedPos?.r === r && selectedPos?.c === c) cell.classList.add('selected');
            const p = board[r][c];
            if (p) {
                const pieceDiv = document.createElement('div');
                pieceDiv.className = 'piece';
                pieceDiv.id = `piece-${r}-${c}`;
                pieceDiv.innerHTML = getSVG(p);
                cell.appendChild(pieceDiv);
            }
            cell.onclick = () => handleClick(r, c);
            boardEl.appendChild(cell);
        }
    }
}

document.getElementById('btn-rot-left').onclick = () => rotate(-1);
document.getElementById('btn-rot-right').onclick = () => rotate(1);
</script>
</body>
</html>
